name: vanestack_generator
description: Code generator for VaneStack - generates route handlers and client SDK metadata.
version: 0.1.1+1
repository: https://github.com/vanestack/vanestack
homepage: https://vanestack.dev
resolution: workspace
topics:
  - codegen
  - build-runner
  - server

environment:
  sdk: ^3.9.2

dependencies:
  analyzer: ^10.0.0
  build: ^4.0.5
  code_builder: ^4.11.1
  dart_style: ^3.1.7
  glob: ^2.1.3
  source_gen: ^4.2.2
  vanestack_annotation: ^0.1.1+1

dev_dependencies:
  lints: ^6.0.0
