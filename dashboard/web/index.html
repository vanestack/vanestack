<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>VaneStack</title>
    <base href="/_/" />

    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/lucide-static@latest/font/lucide.css"
    />

    <script src="https://cdn.jsdelivr.net/npm/basecoat-css@0.3.6/dist/js/all.min.js"></script>
    <script>
      (() => {
        const apply = () => {
          const prefersDark = matchMedia(
            "(prefers-color-scheme: dark)",
          ).matches;
          document.documentElement.classList.toggle("dark", prefersDark);
        };

        apply();

        matchMedia("(prefers-color-scheme: dark)").addEventListener(
          "change",
          apply,
        );
      })();
    </script>
    <!--
            Loads and runs the compiled 'main.client.dart' file,
            can be changed to any other '.client.dart' file inside /lib.
        -->
    <script defer src="main.client.dart.js"></script>
  </head>

    <!-- Your app component will be inserted here. -->
  </body>
</html>
